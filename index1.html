<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blob File Manager</title>
  <style>
    :root {
      --bg1: #eef2ff;
      --bg2: #ecfeff;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --primary: #0f766e;
      --primary-hover: #0d5f59;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
      --border: #e2e8f0;
      --link: #1d4ed8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background: linear-gradient(150deg, var(--bg1) 0%, #f8fafc 45%, var(--bg2) 100%);
      min-height: 100vh;
      padding: 32px 16px;
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 2rem;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    h2 {
      margin: 0 0 14px;
      font-size: 1.25rem;
    }

    .upload-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .status {
      margin: 10px 0 0;
      color: var(--muted);
      min-height: 20px;
      font-weight: 600;
    }

    .file-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .file-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .file-list li:last-child {
      border-bottom: none;
    }

    .file-name {
      color: var(--link);
      text-decoration: none;
      word-break: break-word;
      font-weight: 600;
    }

    .file-name:hover {
      text-decoration: underline;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 8px 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.1s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }

    .btn-danger:hover {
      background: var(--danger-hover);
    }

    .btn-secondary {
      background: #334155;
      color: #fff;
    }

    .btn-secondary:hover {
      background: #1e293b;
    }
.progress-wrap {
  margin-top: 10px;
  width: 100%;
  max-width: 420px;
  height: 10px;
  background: #e2e8f0;
  border-radius: 999px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #0f766e, #14b8a6);
  transition: width 0.15s linear;
}

.progress-text {
  margin: 6px 0 0;
  color: #475569;
  font-size: 0.9rem;
  font-weight: 600;
}
    @media (max-width: 640px) {
      .file-list li {
        flex-direction: column;
        align-items: flex-start;
      }

      .actions {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Blob File Manager</h1>

    <section class="panel">
      <h2>Upload a file</h2>
      <div class="upload-row">
        <input type="file" id="fileInput" />
        <button class="btn btn-primary" id="uploadBtn">Upload</button>
      </div>
      <p id="status" class="status"></p>
      <div id="progressWrap" class="progress-wrap">
  <div id="progressBar" class="progress-bar"></div>
</div>
<p id="progressText" class="progress-text">0%</p>
    </section>

    <section class="panel">
      <h2>Files</h2>
      <ul id="fileList" class="file-list"></ul>
    </section>
  </div>

  <script>
    const containerSasUrl =
      "https://vinodblobfiles2026.blob.core.windows.net/uploads-v1?sp=racwdl&st=2026-04-04T15:27:34Z&se=2026-04-23T23:42:34Z&spr=https&sv=2024-11-04&sr=c&sig=ZqwMis4uxaMZ0DUbg3WvnNJEd9EJ3%2FLjWsrDOn1ipO4%3D";

    const fileInput = document.getElementById("fileInput");
    const uploadBtn = document.getElementById("uploadBtn");
    const statusEl = document.getElementById("status");
    const listEl = document.getElementById("fileList");
    
    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");

    const [containerBaseUrl, sasToken] = containerSasUrl.split("?");

    uploadBtn.addEventListener("click", upload);

  async function upload() {
  const file = fileInput.files[0];
  if (!file) {
    statusEl.textContent = "Select a file first.";
    return;
  }

  const uploadUrl = `${containerBaseUrl}/${encodeURIComponent(file.name)}?${sasToken}`;

  try {
    statusEl.textContent = "Uploading...";
    progressBar.style.width = "0%";
    progressText.textContent = "0%";

    await uploadWithProgress(uploadUrl, file);

    statusEl.textContent = "Upload successful.";
    progressBar.style.width = "100%";
    progressText.textContent = "100%";
    fileInput.value = "";
    await listFiles();
  } catch (err) {
    statusEl.textContent = `Upload failed: ${err.message}`;
    progressBar.style.width = "0%";
    progressText.textContent = "0%";
  }
}
function uploadWithProgress(url, file) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open("PUT", url, true);
    xhr.setRequestHeader("x-ms-blob-type", "BlockBlob");

    xhr.upload.onprogress = (event) => {
      if (!event.lengthComputable) return;
      const percent = Math.round((event.loaded / event.total) * 100);
      progressBar.style.width = `${percent}%`;
      progressText.textContent = `${percent}%`;
    };

    xhr.onload = () => {
      if (xhr.status >= 200 && xhr.status < 300) resolve();
      else reject(new Error(`Upload failed (${xhr.status})`));
    };

    xhr.onerror = () => reject(new Error("Network error during upload"));
    xhr.send(file);
  });
}

    async function deleteFile(fileName) {
      try {
        if (!confirm(`Delete "${fileName}"?`)) return;

        statusEl.textContent = `Deleting ${fileName}...`;
        const deleteUrl = `${containerBaseUrl}/${encodeURIComponent(fileName)}?${sasToken}`;

        const response = await fetch(deleteUrl, { method: "DELETE" });

        if (!response.ok) {
          throw new Error(`Delete failed (${response.status})`);
        }

        statusEl.textContent = `Deleted: ${fileName}`;
        await listFiles();
      } catch (err) {
        statusEl.textContent = `Delete failed: ${err.message}`;
      }
    }

    async function listFiles() {
      try {
        listEl.innerHTML = "";
        const response = await fetch(`${containerSasUrl}&restype=container&comp=list`);

        if (!response.ok) {
          throw new Error(`List failed (${response.status})`);
        }

        const xml = await response.text();
        const doc = new DOMParser().parseFromString(xml, "text/xml");
        const blobs = doc.getElementsByTagName("Blob");

        if (blobs.length === 0) {
          listEl.innerHTML = "<li>No files found.</li>";
          return;
        }

        for (const blob of blobs) {
          const nameNode = blob.getElementsByTagName("Name")[0];
          if (!nameNode) continue;

          const fileName = nameNode.textContent;
          const fileUrl = `${containerBaseUrl}/${encodeURIComponent(fileName)}?${sasToken}`;

          const li = document.createElement("li");

          const fileLink = document.createElement("a");
          fileLink.className = "file-name";
          fileLink.href = fileUrl;
          fileLink.textContent = fileName;
          fileLink.target = "_blank";
          fileLink.rel = "noopener noreferrer";

          const actions = document.createElement("div");
          actions.className = "actions";

          const downloadBtn = document.createElement("a");
          downloadBtn.className = "btn btn-secondary";
          downloadBtn.href = fileUrl;
          downloadBtn.textContent = "Download";
          downloadBtn.setAttribute("download", fileName);

          const deleteBtn = document.createElement("button");
          deleteBtn.className = "btn btn-danger";
          deleteBtn.textContent = "Delete";
          deleteBtn.addEventListener("click", () => deleteFile(fileName));

          actions.appendChild(downloadBtn);
          actions.appendChild(deleteBtn);

          li.appendChild(fileLink);
          li.appendChild(actions);
          listEl.appendChild(li);
        }
      } catch (err) {
        listEl.innerHTML = `<li>${err.message}</li>`;
      }
    }

    listFiles();
  </script>
</body>
</html>
